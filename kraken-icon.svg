<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle with gradient -->
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#0a1929;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#001529;stop-opacity:1" />
    </radialGradient>
    <linearGradient id="krakenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00d4d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00a8a8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="keyboardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d3436;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a1d1e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1011;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="keyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a5568;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d3748;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="keyGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#00a8a8;stop-opacity:0.4" />
    </linearGradient>
    <!-- Glow effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <circle cx="256" cy="256" r="250" fill="url(#bgGrad)"/>
  
  <!-- Stylish Mechanical Keyboard Base -->
  <rect x="100" y="280" width="312" height="180" rx="12" fill="url(#keyboardGrad)" stroke="#00ffff" stroke-width="2" opacity="0.9"/>
  <rect x="105" y="285" width="302" height="170" rx="10" fill="#1a1d1e" opacity="0.6"/>
  
  <!-- Keyboard keys with RGB glow effect -->
  <!-- Row 1 -->
  <rect x="120" y="300" width="30" height="30" rx="4" fill="url(#keyGrad)" stroke="url(#keyGlow)" stroke-width="1.5" filter="url(#softGlow)"/>
  <rect x="160" y="300" width="30" height="30" rx="4" fill="url(#keyGrad)" stroke="url(#keyGlow)" stroke-width="1.5" filter="url(#softGlow)"/>
  <rect x="200" y="300" width="30" height="30" rx="4" fill="url(#keyGrad)" stroke="url(#keyGlow)" stroke-width="1.5" filter="url(#softGlow)"/>
  <rect x="240" y="300" width="30" height="30" rx="4" fill="url(#keyGrad)" stroke="url(#keyGlow)" stroke-width="1.5" filter="url(#softGlow)"/>
  <rect x="280" y="300" width="30" height="30" rx="4" fill="url(#keyGrad)" stroke="url(#keyGlow)" stroke-width="1.5" filter="url(#softGlow)"/>
  <rect x="320" y="300" width="30" height="30" rx="4" fill="url(#keyGrad)" stroke="url(#keyGlow)" stroke-width="1.5" filter="url(#softGlow)"/>
  <rect x="360" y="300" width="30" height="30" rx="4" fill="url(#keyGrad)" stroke="url(#keyGlow)" stroke-width="1.5" filter="url(#softGlow)"/>
  
  <!-- Row 2 -->
  <rect x="120" y="340" width="30" height="30" rx="4" fill="url(#keyGrad)" stroke="#ff00ff" stroke-width="1.5" filter="url(#softGlow)" opacity="0.8"/>
  <rect x="160" y="340" width="30" height="30" rx="4" fill="url(#keyGrad)" stroke="#ff00ff" stroke-width="1.5" filter="url(#softGlow)" opacity="0.8"/>
  <rect x="200" y="340" width="30" height="30" rx="4" fill="url(#keyGrad)" stroke="#ff00ff" stroke-width="1.5" filter="url(#softGlow)" opacity="0.8"/>
  <rect x="240" y="340" width="30" height="30" rx="4" fill="url(#keyGrad)" stroke="#ff00ff" stroke-width="1.5" filter="url(#softGlow)" opacity="0.8"/>
  <rect x="280" y="340" width="30" height="30" rx="4" fill="url(#keyGrad)" stroke="#ff00ff" stroke-width="1.5" filter="url(#softGlow)" opacity="0.8"/>
  <rect x="320" y="340" width="30" height="30" rx="4" fill="url(#keyGrad)" stroke="#ff00ff" stroke-width="1.5" filter="url(#softGlow)" opacity="0.8"/>
  <rect x="360" y="340" width="30" height="30" rx="4" fill="url(#keyGrad)" stroke="#ff00ff" stroke-width="1.5" filter="url(#softGlow)" opacity="0.8"/>
  
  <!-- Row 3 -->
  <rect x="120" y="380" width="30" height="30" rx="4" fill="url(#keyGrad)" stroke="#00ff88" stroke-width="1.5" filter="url(#softGlow)" opacity="0.8"/>
  <rect x="160" y="380" width="30" height="30" rx="4" fill="url(#keyGrad)" stroke="#00ff88" stroke-width="1.5" filter="url(#softGlow)" opacity="0.8"/>
  <rect x="200" y="380" width="70" height="30" rx="4" fill="url(#keyGrad)" stroke="#00ff88" stroke-width="1.5" filter="url(#softGlow)" opacity="0.8"/>
  <rect x="280" y="380" width="30" height="30" rx="4" fill="url(#keyGrad)" stroke="#00ff88" stroke-width="1.5" filter="url(#softGlow)" opacity="0.8"/>
  <rect x="320" y="380" width="30" height="30" rx="4" fill="url(#keyGrad)" stroke="#00ff88" stroke-width="1.5" filter="url(#softGlow)" opacity="0.8"/>
  <rect x="360" y="380" width="30" height="30" rx="4" fill="url(#keyGrad)" stroke="#00ff88" stroke-width="1.5" filter="url(#softGlow)" opacity="0.8"/>
  
  <!-- Row 4 - Spacebar -->
  <rect x="160" y="420" width="190" height="30" rx="4" fill="url(#keyGrad)" stroke="url(#keyGlow)" stroke-width="2" filter="url(#softGlow)"/>
  
  <!-- Kraken tentacles wrapping around keyboard -->
  <!-- Left tentacles -->
  <path d="M 180 200 Q 140 220, 120 250 Q 100 280, 95 310" 
        stroke="url(#krakenGrad)" stroke-width="16" fill="none" 
        stroke-linecap="round" filter="url(#glow)"/>
  <path d="M 200 210 Q 170 230, 155 260 Q 145 285, 145 310" 
        stroke="url(#krakenGrad)" stroke-width="14" fill="none" 
        stroke-linecap="round" filter="url(#glow)"/>
  
  <!-- Right tentacles -->  
  <path d="M 332 200 Q 372 220, 392 250 Q 412 280, 417 310" 
        stroke="url(#krakenGrad)" stroke-width="16" fill="none" 
        stroke-linecap="round" filter="url(#glow)"/>
  <path d="M 312 210 Q 342 230, 357 260 Q 367 285, 367 310" 
        stroke="url(#krakenGrad)" stroke-width="14" fill="none" 
        stroke-linecap="round" filter="url(#glow)"/>
  
  <!-- Front tentacles on keyboard -->
  <path d="M 220 220 Q 210 260, 180 340" 
        stroke="url(#krakenGrad)" stroke-width="18" fill="none" 
        stroke-linecap="round" filter="url(#glow)"/>
  <path d="M 240 230 Q 240 280, 220 380" 
        stroke="url(#krakenGrad)" stroke-width="20" fill="none" 
        stroke-linecap="round" filter="url(#glow)"/>
  <path d="M 272 230 Q 272 280, 292 380" 
        stroke="url(#krakenGrad)" stroke-width="20" fill="none" 
        stroke-linecap="round" filter="url(#glow)"/>
  <path d="M 292 220 Q 302 260, 332 340" 
        stroke="url(#krakenGrad)" stroke-width="18" fill="none" 
        stroke-linecap="round" filter="url(#glow)"/>
  
  <!-- Suckers on tentacles -->
  <circle cx="125" cy="280" r="5" fill="#00a8a8" opacity="0.8"/>
  <circle cx="160" cy="275" r="4" fill="#00a8a8" opacity="0.8"/>
  <circle cx="185" cy="300" r="6" fill="#00a8a8" opacity="0.8"/>
  <circle cx="225" cy="300" r="7" fill="#00a8a8" opacity="0.8"/>
  <circle cx="287" cy="300" r="7" fill="#00a8a8" opacity="0.8"/>
  <circle cx="327" cy="300" r="6" fill="#00a8a8" opacity="0.8"/>
  <circle cx="352" cy="275" r="4" fill="#00a8a8" opacity="0.8"/>
  <circle cx="387" cy="280" r="5" fill="#00a8a8" opacity="0.8"/>
  
  <!-- Kraken Head - sitting on top of keyboard -->
  <ellipse cx="256" cy="180" rx="90" ry="75" fill="url(#krakenGrad)" filter="url(#glow)"/>
  
  <!-- Eyes - glowing red -->
  <ellipse cx="230" cy="170" rx="16" ry="20" fill="#ff0000" filter="url(#glow)"/>
  <ellipse cx="230" cy="170" rx="10" ry="14" fill="#ff3333"/>
  <ellipse cx="230" cy="166" rx="5" ry="7" fill="#ffcccc"/>
  
  <ellipse cx="282" cy="170" rx="16" ry="20" fill="#ff0000" filter="url(#glow)"/>
  <ellipse cx="282" cy="170" rx="10" ry="14" fill="#ff3333"/>
  <ellipse cx="282" cy="166" rx="5" ry="7" fill="#ffcccc"/>
  
  <!-- Menacing beak/mouth -->
  <path d="M 246 195 Q 256 205, 266 195" 
        stroke="url(#krakenGrad)" stroke-width="4" fill="none" 
        stroke-linecap="round"/>
  <path d="M 240 200 Q 256 215, 272 200" 
        stroke="#00d4d4" stroke-width="3" fill="none" 
        stroke-linecap="round"/>
  
  <!-- Crown/spikes on top for dominance -->
  <path d="M 236 125 L 230 100 L 240 115 Z" fill="#00ffff" opacity="0.9" filter="url(#softGlow)"/>
  <path d="M 256 118 L 252 88 L 260 108 Z" fill="#00ffff" opacity="1" filter="url(#softGlow)"/>
  <path d="M 276 125 L 282 100 L 272 115 Z" fill="#00ffff" opacity="0.9" filter="url(#softGlow)"/>
  
  <!-- Typing effect - glowing letters/particles -->
  <text x="140" y="270" font-family="monospace" font-size="16" fill="#00ffff" opacity="0.6" filter="url(#softGlow)">type</text>
  <text x="330" y="270" font-family="monospace" font-size="16" fill="#ff00ff" opacity="0.6" filter="url(#softGlow)">click</text>
  <circle cx="256" cy="90" r="3" fill="#00ffff" opacity="0.7"/>
  <circle cx="270" cy="75" r="2" fill="#00ffff" opacity="0.5"/>
  <circle cx="240" cy="80" r="2.5" fill="#00ffff" opacity="0.6"/>
</svg>
